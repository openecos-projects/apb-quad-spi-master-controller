uid: ip-000021
repo_name: apb-quad-spi-master-controller
slug: apb-quad-spi-master-controller
display_name: APB Quad SPI Master Controller
summary: APB-based SPI/QSPI master controller with command, address, dummy-cycle and data phase control, programmable clock divider, TX/RX FIFOs, four chip-select outputs, and interrupt event generation.
summary_zh: 基于 APB 总线的 SPI/QSPI 主控制器，支持命令、地址、dummy 周期和数据阶段控制，可编程时钟分频，独立收发 FIFO，最多 4 路片选输出以及基于 FIFO 阈值的中断事件输出；当前代码来自 ref/apb_spi_master 本地参考快照。
